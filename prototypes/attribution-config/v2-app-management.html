    if (applied.game.length && !applied.game.includes(app.game)) return false;
    if (applied.platform.length && !applied.platform.includes(app.platform)) return false;
    if (applied.system.length && !applied.system.includes(app.system)) return false;
    if (applied.name && !app.appName.includes(applied.name) && !app.appId.includes(applied.name)) return false;
    return true;
  });

    setFormMode('edit'); setEditId(app.id);
    const { id, ...rest } = app;
    const existing = rest.coloringMethods || [];

                    current: currentPage, pageSize: pageSize, total: filteredApps.length,
                    showSizeChanger: true, showTotal: total => `共 ${total} 条`,
                    pageSizeOptions: [20, 50, 100],
                    onChange: (page, size) => { setCurrentPage(page); setPageSize(size); },
                    size: 'small',
                  },
                  scroll: { x: 1800 },
                  size: 'middle',
                  bordered: false,
                  sticky: true,
                  rowClassName: (_, index) => index % 2 === 0 ? 'row-white' : 'row-stripe',
                  expandable: {
                    expandedRowKeys: Object.keys(expandedRows).filter(k => expandedRows[k]).map(Number),
                    expandedRowRender: (record) => React.createElement(ExpandRowDetail, { app: record }),
                    expandedRowClassName: (_, index) => index % 2 === 0 ? 'row-white' : 'row-stripe',
                    expandIcon: () => null,
                    expandRowByClick: false,
                  },
                  style: { background: '#fff', borderRadius: 6 },
                })
              )
            )
            : React.createElement('div', {
                style: { flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'rgba(0,0,0,0.25)', fontSize: 13 }
              }, '回传管理页面开发中')
          )
        )
      ),

      // Modal
      React.createElement(AppFormModal, {
        open: drawerOpen, mode: formMode, form: form, setForm: setForm,
        onClose: () => setDrawerOpen(false), onSubmit: handleSubmit,
      })
    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
